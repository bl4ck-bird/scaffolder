# cargo-deny — supply-chain linting. Runs in CI (.github/workflows/ci.yml),
# not in a git hook: the advisory check fetches the RustSec DB over the
# network, which would break offline pushes.

[advisories]
version = 2
# In v2, vulnerabilities / unmaintained / unsound / yanked crates are denied
# by default. Add advisory IDs here only with a documented reason.
ignore = []

[licenses]
version = 2
# This crate ships under MIT OR Apache-2.0; keep dependencies permissive.
# SPDX OR-expressions (e.g. "Unlicense OR MIT") are satisfied by MIT below;
# only the licenses actually required by the tree are listed.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "Unicode-3.0", # required via AND by unicode-ident
    "MPL-2.0",     # transitive: dirs -> dirs-sys -> option-ext
]

[bans]
# Surface accidental duplicate versions without failing the build.
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
