name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          # Intel x86_64 (macos-13 retired 2025-12; macos-15-intel is the current Intel image)
          - runner: macos-15-intel
            target: x86_64-apple-darwin
          - runner: macos-14
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scaffolder-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/scaffolder
          if-no-files-found: error

  verify-publish:
    name: cargo publish --dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Dry-run publish check
        run: cargo publish --dry-run

  release:
    name: github release
    needs: [build, verify-publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist

      - name: Package binaries
        run: |
          mkdir release-assets
          for dir in dist/scaffolder-*/; do
            target="$(basename "$dir" | sed 's/^scaffolder-//')"
            chmod +x "$dir/scaffolder"
            tar -czf "release-assets/scaffolder-${target}.tar.gz" \
              -C "$dir" scaffolder \
              -C "$GITHUB_WORKSPACE" LICENSE-MIT LICENSE-APACHE README.md
          done
          ls -l release-assets

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "$GITHUB_REF_NAME"
          release-assets/*.tar.gz
          --title "$GITHUB_REF_NAME"
          --generate-notes

  # Actual publish is intentionally disabled: first crates.io
  # publish is a deliberate, irreversible act pending explicit user
  # approval. Flip `if: false` to `if: true` and provide
  # CARGO_REGISTRY_TOKEN only after that approval.
  publish:
    name: cargo publish (disabled)
    needs: [build, verify-publish]
    runs-on: ubuntu-latest
    if: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable

      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
